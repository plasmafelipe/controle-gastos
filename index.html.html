<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Gastos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#eef2f7;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:16px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.valor{
font-size:24px;
font-weight:bold;
}

.verde{color:#16a34a}
.vermelho{color:#dc2626}
.azul{color:#2563eb}
.laranja{color:#f97316}

.login{
max-width:420px;
margin:40px auto;
background:white;
padding:20px;
border-radius:16px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
border:none;
cursor:pointer;
}

#app{
display:none;
}
</style>
</head>

<body>

<header>
<h1>💰 Controle de Gastos</h1>
<p>Controle financeiro completo na nuvem</p>
</header>

<div id="login" class="login">

<h2>Entrar</h2>

<input type="email" id="email" placeholder="E-mail">

<input type="password" id="senha" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<button onclick="criarConta()" style="background:#16a34a">
Criar conta
</button>

<p id="msg"></p>

</div>

<div id="app" class="container">

<div class="grid">

<div class="card">
<h3>Gastos pendentes</h3>
<div class="valor vermelho">R$ 0,00</div>
</div>

<div class="card">
<h3>Total já pago</h3>
<div class="valor verde">R$ 0,00</div>
</div>

<div class="card">
<h3>Saldo disponível</h3>
<div class="valor azul">R$ 0,00</div>
</div>

<div class="card">
<h3>Total guardado</h3>
<div class="valor laranja">R$ 0,00</div>
</div>

</div>

</div>

<script>

const supa = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

async function entrar(){

const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

const {data,error}=await supa.auth.signInWithPassword({
email:email,
password:senha
});

if(error){
document.getElementById("msg").innerText=error.message;
return;
}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}

async function criarConta(){

const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

const {error}=await supa.auth.signUp({
email:email,
password:senha
});

if(error){
document.getElementById("msg").innerText=error.message;
return;
}

document.getElementById("msg").innerText="Conta criada.";

}

</script>

</body>
</html>
